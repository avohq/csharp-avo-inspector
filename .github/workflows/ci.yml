name: CI

on:
  push:
    branches: [main, build-csharp-inspector-sdk]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AvoInspector.sln

      - name: Build (netstandard2.0 + net8.0)
        run: dotnet build AvoInspector.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/AvoInspector.Tests/AvoInspector.Tests.csproj -c Release --no-build --verbosity normal
